<!doctype html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Al Brooks 价格行为图形与形态交互图谱：K 线、趋势、区间、突破、延续、反转、缺口和日内结构。">
  <title>Al Brooks 价格行为图谱</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #081014;
      --bg-grid: rgba(201, 220, 222, .028);
      --surface: #0c151a;
      --surface-2: #101b21;
      --surface-3: #142128;
      --text: #f0dfc6;
      --body: #c4c7c3;
      --muted: #7f8a8a;
      --line: #27363d;
      --line-strong: #3b4c54;
      --bull: #4fc3a1;
      --bear: #ff7058;
      --amber: #e8aa3c;
      --blue: #72a7d8;
      --shadow: 0 18px 46px rgba(0, 0, 0, .24);
      --radius: 10px;
      --max: 1540px;
      --sans: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      --tech: "Arial Narrow", "DIN Condensed", "Roboto Condensed", ui-sans-serif, sans-serif;
    }

    html[data-theme="light"] {
      color-scheme: light;
      --bg: #f5f3ed;
      --bg-grid: rgba(31, 46, 50, .04);
      --surface: #fffdfa;
      --surface-2: #f7f4ed;
      --surface-3: #ece9e1;
      --text: #182328;
      --body: #414b4e;
      --muted: #748084;
      --line: #d6d7d1;
      --line-strong: #b9bebc;
      --bull: #178a72;
      --bear: #d84d3c;
      --amber: #b77a12;
      --blue: #3476a8;
      --shadow: 0 18px 46px rgba(35, 42, 44, .10);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-width: 320px;
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--bg-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px);
      background-size: 40px 40px;
      color: var(--body);
      font-family: var(--sans);
      line-height: 1.6;
      transition: background-color .2s ease, color .2s ease;
    }

    button, input { font: inherit; }
    button { color: inherit; }
    a { color: inherit; }
    :focus-visible { outline: 2px solid var(--amber); outline-offset: 3px; }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 91%, transparent);
      -webkit-backdrop-filter: blur(18px);
      backdrop-filter: blur(18px);
    }

    .header-main {
      max-width: var(--max);
      min-height: 78px;
      margin: 0 auto;
      padding: 14px 28px;
      display: grid;
      grid-template-columns: minmax(360px, 1fr) minmax(320px, 420px) auto;
      align-items: center;
      gap: 24px;
    }

    .brand { display: flex; align-items: baseline; gap: 24px; min-width: 0; }
    .brand h1 {
      margin: 0;
      color: var(--text);
      font-family: var(--tech);
      font-size: clamp(22px, 2.1vw, 31px);
      font-weight: 700;
      letter-spacing: .02em;
      white-space: nowrap;
    }
    .brand p { margin: 0; color: var(--muted); font-size: 14px; white-space: nowrap; }

    .search-wrap { position: relative; }
    .search-wrap svg {
      position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
      width: 18px; height: 18px; color: var(--muted); pointer-events: none;
    }
    #search {
      width: 100%; height: 44px; padding: 0 44px;
      border: 1px solid var(--line-strong); border-radius: 9px;
      background: var(--surface); color: var(--text); font-size: 14px;
      transition: border-color .16s ease, box-shadow .16s ease;
    }
    #search:focus { border-color: var(--blue); box-shadow: 0 0 0 3px color-mix(in srgb, var(--blue) 17%, transparent); outline: none; }
    #search::placeholder { color: var(--muted); }
    .clear-search {
      position: absolute; right: 7px; top: 50%; transform: translateY(-50%);
      width: 31px; height: 31px; display: none; place-items: center;
      border: 0; border-radius: 6px; background: transparent; color: var(--muted); cursor: pointer;
    }
    .clear-search:hover { background: var(--surface-3); color: var(--text); }

    .icon-button {
      width: 42px; height: 42px; display: grid; place-items: center;
      border: 1px solid var(--line-strong); border-radius: 50%;
      background: var(--surface); cursor: pointer;
      transition: transform .16s ease, background .16s ease;
    }
    .icon-button:hover { background: var(--surface-3); transform: translateY(-1px); }
    .icon-button svg { width: 19px; height: 19px; }

    .filters {
      max-width: var(--max); margin: 0 auto; padding: 0 28px;
      display: flex; overflow-x: auto; scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-button {
      flex: 1 0 auto; min-width: 112px; height: 50px; padding: 0 18px;
      border: 0; border-bottom: 2px solid transparent; background: transparent;
      color: var(--muted); cursor: pointer; font-size: 14px; letter-spacing: .02em;
      transition: color .16s ease, border-color .16s ease, background .16s ease;
    }
    .filter-button:hover { color: var(--text); background: color-mix(in srgb, var(--surface-2) 55%, transparent); }
    .filter-button.active { color: var(--text); border-bottom-color: var(--amber); }

    .layout {
      max-width: var(--max); margin: 0 auto; padding: 28px;
      display: grid; grid-template-columns: 238px minmax(0, 1fr); gap: 28px;
    }

    .sidebar {
      position: sticky; top: 158px; align-self: start; height: calc(100vh - 186px);
      display: flex; flex-direction: column; border-right: 1px solid var(--line); padding-right: 24px;
    }
    .sidebar-title {
      margin: 0 0 14px; color: var(--text); font-family: var(--tech); font-size: 16px; letter-spacing: .05em;
    }
    .sidebar-nav { overflow-y: auto; padding-right: 6px; }
    .sidebar-link {
      width: 100%; min-height: 42px; margin: 1px 0; padding: 8px 9px;
      display: grid; grid-template-columns: 25px 1fr auto; gap: 8px; align-items: center;
      border: 0; border-left: 2px solid transparent; border-radius: 0 6px 6px 0;
      background: transparent; color: var(--muted); text-align: left; cursor: pointer; font-size: 12px;
    }
    .sidebar-link:hover { background: var(--surface-2); color: var(--text); }
    .sidebar-link.active { border-left-color: var(--amber); background: var(--surface-3); color: var(--text); }
    .sidebar-number { font-family: var(--tech); font-variant-numeric: tabular-nums; }
    .sidebar-link strong { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
    .sidebar-link span:last-child { font-size: 10px; }
    .sidebar-note { margin-top: auto; padding-top: 18px; color: var(--muted); font-size: 12px; }

    .main { min-width: 0; }
    .principle {
      margin-bottom: 20px; padding: 18px 20px; display: grid;
      grid-template-columns: auto 1fr auto; gap: 16px; align-items: center;
      border: 1px solid var(--line); border-left: 3px solid var(--amber); border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface) 82%, transparent);
    }
    .principle-mark {
      width: 30px; height: 30px; display: grid; place-items: center; border: 1px solid var(--amber); border-radius: 50%;
      color: var(--amber); font-family: Georgia, serif; font-weight: 700;
    }
    .principle strong { color: var(--text); }
    .principle p { margin: 2px 0 0; color: var(--muted); font-size: 13px; }
    .result-count { color: var(--muted); font-family: var(--tech); font-size: 13px; white-space: nowrap; }

    .atlas-list { display: grid; gap: 9px; }
    .pattern-card {
      border: 1px solid var(--line); border-radius: var(--radius); background: var(--surface);
      overflow: clip; transition: border-color .18s ease, background .18s ease, transform .18s ease;
    }
    .pattern-card:hover { border-color: var(--line-strong); background: color-mix(in srgb, var(--surface) 92%, var(--surface-2)); }
    .pattern-card.expanded { border-color: var(--amber); box-shadow: var(--shadow); }

    @media (min-width: 821px) {
      .pattern-card.expanded .card-trigger {
        min-height: 232px;
        grid-template-columns: 66px minmax(420px, 55%) 1fr 44px;
      }
      .pattern-card.expanded .chart-shell svg { height: 198px; }
      .pattern-card.expanded .pattern-summary { max-width: 430px; }
    }

    .card-trigger {
      width: 100%; min-height: 150px; padding: 0;
      display: grid; grid-template-columns: 66px minmax(300px, 43%) 1fr 44px;
      align-items: stretch; border: 0; background: transparent; text-align: left; cursor: pointer;
    }
    .card-number {
      display: grid; place-items: center; border-right: 1px solid var(--line);
      color: var(--text); font-family: var(--tech); font-size: 16px; font-variant-numeric: tabular-nums;
    }
    .chart-shell { min-width: 0; padding: 14px 18px; display: grid; place-items: center; border-right: 1px solid var(--line); }
    .chart-shell svg { width: 100%; height: 122px; display: block; overflow: visible; }
    .card-copy { min-width: 0; padding: 22px 24px; align-self: center; }
    .title-row { display: flex; gap: 14px; align-items: flex-start; justify-content: space-between; }
    .pattern-name { margin: 0; color: var(--text); font-family: var(--tech); font-size: clamp(19px, 1.6vw, 25px); line-height: 1.08; }
    .pattern-zh { margin: 5px 0 8px; color: var(--body); font-size: 15px; line-height: 1.3; }
    .pattern-summary { margin: 0; max-width: 700px; color: var(--muted); font-size: 13px; line-height: 1.65; }
    .context-tag {
      flex: 0 0 auto; padding: 3px 8px; border: 1px solid var(--line-strong); border-radius: 5px;
      color: var(--muted); font-size: 11px; line-height: 1.5;
    }
    .context-tag.bull { border-color: color-mix(in srgb, var(--bull) 55%, var(--line)); color: var(--bull); }
    .context-tag.bear { border-color: color-mix(in srgb, var(--bear) 55%, var(--line)); color: var(--bear); }
    .context-tag.breakout { border-color: color-mix(in srgb, var(--blue) 55%, var(--line)); color: var(--blue); }
    .chevron { display: grid; place-items: center; color: var(--muted); }
    .chevron svg { width: 19px; height: 19px; transition: transform .2s ease; }
    .pattern-card.expanded .chevron svg { transform: rotate(180deg); color: var(--amber); }

    .card-detail {
      display: grid; grid-template-rows: 0fr; border-top: 0 solid var(--line);
      transition: grid-template-rows .25s ease, border-width .25s ease;
    }
    .pattern-card.expanded .card-detail { grid-template-rows: 1fr; border-top-width: 1px; }
    .detail-inner { overflow: hidden; }
    .detail-grid {
      padding: 24px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    }
    .detail-cell { min-width: 0; padding: 3px 22px; border-left: 1px solid var(--line); }
    .detail-cell:first-child { border-left: 0; padding-left: 0; }
    .detail-cell:last-child { padding-right: 0; }
    .detail-label { margin: 0 0 7px; color: var(--amber); font-family: var(--tech); font-size: 11px; letter-spacing: .12em; }
    .detail-cell p:last-child { margin: 0; color: var(--body); font-size: 12px; line-height: 1.75; }

    .empty {
      display: none; min-height: 300px; place-items: center; border: 1px dashed var(--line-strong); border-radius: var(--radius);
      color: var(--muted); text-align: center;
    }
    .empty strong { display: block; margin-bottom: 5px; color: var(--text); font-size: 18px; }

    .back-top {
      position: fixed; right: 24px; bottom: 24px; z-index: 12;
      width: 44px; height: 44px; display: grid; place-items: center;
      border: 1px solid var(--line-strong); border-radius: 50%; background: var(--surface-2); color: var(--text);
      box-shadow: var(--shadow); cursor: pointer; opacity: 0; pointer-events: none; transform: translateY(10px);
      transition: opacity .18s ease, transform .18s ease;
    }
    .back-top.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }
    .back-top svg { width: 18px; height: 18px; }

    .chart-grid { stroke: var(--line); stroke-width: .7; opacity: .58; }
    .guide { fill: none; stroke: var(--muted); stroke-width: 1.1; stroke-dasharray: 5 4; opacity: .8; }
    .guide-amber { stroke: var(--amber); }
    .guide-blue { stroke: var(--blue); }
    .zone { fill: color-mix(in srgb, var(--blue) 12%, transparent); stroke: color-mix(in srgb, var(--blue) 42%, transparent); stroke-width: .8; stroke-dasharray: 4 3; }
    .chart-label { fill: var(--amber); font: 700 10px var(--tech); }
    .chart-muted { fill: var(--muted); font: 9px var(--tech); }
    .candle-up .wick { stroke: var(--bull); }
    .candle-up .body { fill: var(--bull); }
    .candle-down .wick { stroke: var(--bear); }
    .candle-down .body { fill: var(--bear); }
    .candle-emphasis .body { stroke: var(--amber); stroke-width: 1.15; }
    .wick { stroke-width: 1.35; }
    .body { rx: .6px; }
    .price-path { fill: none; stroke: color-mix(in srgb, var(--body) 35%, transparent); stroke-width: .7; }
    .chart-caption { letter-spacing: .05em; }

    @media (max-width: 1100px) {
      .header-main { grid-template-columns: 1fr minmax(260px, 360px) auto; }
      .brand p { display: none; }
      .layout { grid-template-columns: 200px minmax(0, 1fr); gap: 20px; }
      .card-trigger { grid-template-columns: 56px minmax(250px, 42%) 1fr 38px; }
      .detail-grid { grid-template-columns: repeat(2, 1fr); row-gap: 20px; }
      .detail-cell:nth-child(3) { border-left: 0; padding-left: 0; }
    }

    @media (max-width: 820px) {
      .header-main { min-height: auto; padding: 14px 16px; grid-template-columns: 1fr auto; gap: 12px; }
      .brand { display: block; }
      .brand h1 { font-size: 22px; }
      .search-wrap { grid-column: 1 / -1; grid-row: 2; }
      .filters { padding: 0 10px; }
      .filter-button { min-width: 94px; height: 44px; padding: 0 12px; font-size: 12px; }
      .layout { display: block; padding: 16px; }
      .sidebar { display: none; }
      .principle { grid-template-columns: auto 1fr; padding: 14px; }
      .result-count { grid-column: 2; }
      .card-trigger { grid-template-columns: 46px 1fr 38px; min-height: 0; }
      .card-number { grid-row: 1 / span 2; }
      .chart-shell { grid-column: 2; border-right: 0; border-bottom: 1px solid var(--line); padding: 8px 12px; }
      .chart-shell svg { height: 118px; }
      .card-copy { grid-column: 2; padding: 16px 14px 18px; }
      .chevron { grid-column: 3; grid-row: 1 / span 2; }
      .pattern-name { font-size: 20px; }
      .title-row { gap: 8px; }
      .detail-grid { grid-template-columns: 1fr; padding: 20px; gap: 18px; }
      .detail-cell, .detail-cell:nth-child(3) { border-left: 0; border-top: 1px solid var(--line); padding: 16px 0 0; }
      .detail-cell:first-child { border-top: 0; padding-top: 0; }
    }

    @media (max-width: 480px) {
      .brand h1 { white-space: normal; line-height: 1.15; }
      .principle-mark { display: none; }
      .principle, .result-count { grid-template-columns: 1fr; grid-column: 1; }
      .card-trigger { grid-template-columns: 38px 1fr 32px; }
      .chart-shell { padding-inline: 6px; }
      .card-copy { padding-inline: 12px; }
      .context-tag { display: none; }
      .back-top { right: 14px; bottom: 14px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition-duration: .01ms !important; animation-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-main">
      <div class="brand">
        <h1>Al Brooks 价格行为图谱</h1>
        <p>从单根 K 线到完整市场循环</p>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="6.8"/><path d="m16 16 4 4"/></svg>
        <label for="search" class="sr-only" hidden>搜索形态</label>
        <input id="search" type="search" placeholder="搜索形态：H2、楔形、缺口……" autocomplete="off">
        <button class="clear-search" id="clearSearch" type="button" aria-label="清空搜索">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m7 7 10 10M17 7 7 17"/></svg>
        </button>
      </div>
      <button class="icon-button" id="themeToggle" type="button" aria-label="切换明暗主题"></button>
    </div>
    <nav class="filters" id="filters" aria-label="形态分类"></nav>
  </header>

  <div class="layout">
    <aside class="sidebar" aria-label="形态索引">
      <h2 class="sidebar-title">形态索引</h2>
      <div class="sidebar-nav" id="sidebarNav"></div>
      <p class="sidebar-note">点击任一形态，查看识别线索、确认条件和常见误读。</p>
    </aside>

    <main class="main">
      <section class="principle" aria-label="Brooks 形态原则">
        <div class="principle-mark" aria-hidden="true">!</div>
        <div>
          <strong>图形是语言，不是信号。</strong>
          <p>先判断市场状态和位置，再看触发与跟进。本版用实体、影线、重叠和回调深度表达强弱；紧／宽通道采用同一尺度。</p>
        </div>
        <div class="result-count" id="resultCount" aria-live="polite"></div>
      </section>

      <section class="atlas-list" id="atlasList" aria-label="价格行为形态列表"></section>
      <div class="empty" id="emptyState">
        <div><strong>没有匹配的形态</strong><span>试试“楔形”“H2”或“突破”。</span></div>
      </div>
    </main>
  </div>

  <button class="back-top" id="backTop" type="button" aria-label="返回顶部">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m6 14 6-6 6 6"/></svg>
  </button>

  <script>
    const categories = [
      { id: 'all', label: '全部' },
      { id: 'bars', label: 'K线基础' },
      { id: 'trend', label: '趋势结构' },
      { id: 'range', label: '区间与突破' },
      { id: 'continuation', label: '延续形态' },
      { id: 'reversal', label: '反转形态' },
      { id: 'gaps', label: '缺口' },
      { id: 'day', label: '日内形态' }
    ];

    const C = {
      bars: 'K线', trend: '趋势', range: '区间', breakout: '突破', continuation: '延续',
      reversal: '反转', gaps: '缺口', day: '日内', neutral: '双向', bull: '多头', bear: '空头'
    };

    const patterns = [
      // K 线基础
      p('trend-bar','Trend Bar','趋势 K 线','bars','trendBar','trend','只要开收不同、形成实体，就是趋势 K 线；实体越大、收盘越靠近极值，强度通常越高。','先区分普通趋势 K 线与强趋势 K 线：后者相对周围实体更大、反向影线更短，收盘更靠近高点或低点。','强趋势 K 线之后继续同向推进，并且没有迅速退回其实体，才形成更可靠的控制证据。','把“趋势 K 线”等同于“大 K 线”，或把单根大 K 线直接当成完整趋势。'),
      p('doji','Doji','十字 / 小实体 K 线','bars','doji','neutral','开收接近，表示本根没有一方控制；实体大小必须相对该周期和周围 K 线判断。','实体很小或没有实体，常带上下影线；所有非 trend bar 都归入 doji。','重要位置出现后，仍需由方向 K 线和跟进确认。','用固定点数定义 doji，或在区间中部把普通 doji 当成反转信号。'),
      p('shaved-bar','Shaved Body','无影线端 / 光头光脚','bars','shaved','trend','一端或两端没有影线，只表示开盘价或收盘价正好位于该端极值。','牛 K 线无上影、熊 K 线无下影会加强近极值收盘；若缺失的是开盘端影线，不能单独推导收盘压力。','结合实体方向、所在位置和后续跟进判断。','看到任意 shaved 端就解释成强收盘。'),
      p('tail','Tail / Wick','影线','bars','tail','neutral','影线记录价格从本根极值回撤到实体的区间；它可以累积成买压或卖压，但不是自动反转。','长下影可计入买压，长上影可计入卖压；意义取决于趋势、位置和后续。','影线方向随后获得实体和跟进，才形成更强拒绝证据。','把任何长影线都直接理解为反转。'),
      p('reversal-bar','Reversal Bar','反转 K 线','bars','reversalBar','reversal','当前腿方向相反的趋势 K 线；它表示反转尝试，不表示趋势已经完成反转。','必要条件是实体方向与当前腿相反；经典反转 K 常有反向影线并近极值收盘，越过旧极值后收回只是加强项。','触发信号高低点后，由入场 K 线和跟进检验。','把“先创新极值再收回”误当必要条件，或在紧趋势中仅凭一根 K 线逆势。'),
      p('two-bar-reversal','Two-Bar Reversal','两根 K 线反转','bars','twoBar','reversal','相邻两根共同完成反转：原方向 K 线之后出现反方向 K 线，控制开始转移。','通常是相反方向实体，合看具有明显反转效果；第二根可以内包，不要求外包、等大或吞没第一根。','位于重要位置，触发第二根信号高低点后获得跟进。','把外包吞没外观误当必要条件，或忽略组合止损过远。'),
      p('inside-bar','Inside Bar','内包 K 线','bars','inside','neutral','本根 high ≤ 前高且 low ≥ 前低，表示波动压缩；一端相等仍可成立。','母 K 线完整包含后续 K 线高低点，标准定义使用完整范围而非只有实体。','等待突破质量和跟进，不预判方向。','把严格缩在内部当成唯一形式，或把内包本身当方向信号。'),
      p('outside-bar','Outside Bar','外包 K 线','bars','outside','neutral','至少一端严格超越、另一端相等或超越前一根，可能是强控制，也可能是双边混乱。','high > 前高且 low ≤ 前低，或 low < 前低且 high ≥ 前高；完全相同范围不算 outside。','最终收盘和后续跟进决定短期含义。','要求两端都必须严格突破，或只看扫过两端不看收盘。'),
      p('pullback-pause-bar','Pullback / Pause Bar','回调 / 暂停 K 线','bars','pause','continuation','Pause 停止扩展趋势方向极值；bar pullback 则至少一跳反向越过前一根极值。','牛向运动中 pause 的 high 不高于前高；bar pullback 的 low 低于前低，熊向运动镜像。','原趋势恢复且结构未被破坏时，它们承担延续功能。','把 pause 和 bar pullback 混成同一几何条件。'),
      p('ii-iii','ii / iii','连续内包','bars','ii','neutral','连续两根或三根完整范围内包，是典型突破模式。','第二根 inside 第一根形成 ii；第三根继续 inside 第二根形成 iii。标准判断使用高低点，bodies-only ii 是较弱变体。','突破 K 线强、跟进清楚、没有立即回到压缩区。','只画 ii 却称 iii，或提前押方向。'),
      p('ioi','ioi','内包—外包—内包','bars','ioi','neutral','波动收缩、扩大、再收缩，双方暂时平衡。','第一根相对其前一根 inside，第二根 outside 第一根，第三根 inside 第二根。','突破最后一根内包后再观察连续性。','把外包那根误认为方向已经确定。'),
      p('oo','oo','连续外包','bars','oo','neutral','第一根 outside 前一根，第二根再 outside 第一根，因此范围继续扩大。','两根连续 outside bar 形成 oo，体现双边冲突而非天然方向。','最终强收盘的一方继续得到跟进。','把任何两根大 K 线称为 oo，或在冲突中追每次突破。'),
      p('signal-entry-bar','Signal → Entry Bar','信号与入场 K 线','bars','signalEntry','breakout','Signal 与 Entry 是交易角色：setup 最后一根提供触发，订单实际成交所在 K 线才是 entry bar。','做多在 signal high 上方触发，做空在 signal low 下方触发；entry bar 通常紧随其后但由实际成交定义。','强 entry bar 和后续跟进是质量证据，不是成为 entry bar 的必要条件。','只评价 signal bar 漂亮，或把下一根无条件叫 entry bar。'),

      // 趋势结构
      p('bull-trend','Bull Trend','牛趋势','trend','bullTrend','bull','高点和低点总体抬高，多头恢复快，空头尝试经常失败。','强趋势常有连续的相对大牛实体、近高收盘和短反向影线；回调 K 线明显更小、更浅。','回调后再次突破前高，并由新的强牛 K 线获得跟进。','把“牛趋势”简化成每根都必须是大阳线，或因为价格已经很高而过早逆势。'),
      p('bear-trend','Bear Trend','熊趋势','trend','bearTrend','bear','高点和低点总体降低，卖方持续控制。','强趋势常有连续的相对大熊实体、近低收盘和短反向影线；反弹 K 线明显更小、更浅。','反弹失败并由新的强熊 K 线再次跌破前低。','把“熊趋势”简化成每根都必须是大阴线，或因为价格已经很低而机械抄底。'),
      p('tight-channel','Tight Channel','紧通道','trend','tightChannel','trend','趋势线与通道线靠近；回调浅且通常仅 1–3 根，方向控制持续。','价格紧贴狭窄通道，反向 K 线少而弱；少重叠、实体缺口、微缺口或近似缺口是常见强度线索，但不是必要条件。','第一次逆势突破多半只形成小回调，随后原方向再测试极值。','认为紧通道必须每根都是巨型 K 线；强度也可以来自一串中小趋势 K 线的持续控制。'),
      p('broad-channel','Broad Channel','宽通道','trend','broadChannel','trend','有轻微方向优势，但本质接近倾斜交易区间，双边交易都可能获利。','常见 3–10 根的深回调、较多重叠和双向强腿；回撤往往超过前一腿的一半。','顺势交易更依赖通道边缘、二次入场和足够目标空间，而不是在中部追价。','只因高低点仍在抬高就把宽通道按强趋势处理。'),
      p('spike','Spike','急冲','trend','spike','trend','突然出现强烈单边运动，打破旧共识并制造 surprise。','连续大趋势 K 线、重叠少、回调少。','即使先回调，也常再次测试急冲方向。','第一根逆势 K 线就认为急冲结束。'),
      p('spike-channel','Spike and Channel','急冲—通道','trend','spikeChannel','trend','趋势先急冲，再以较弱但仍有方向的通道延续。','前段是少重叠的大趋势 K 线；后段斜率下降、实体缩小，并开始出现小回调和更多重叠。','通道保持方向；后期再观察交易区间化或反转过程。','把通道减速直接等同于反向趋势。'),
      p('small-pullback-trend','Small Pullback Trend','小回调趋势','trend','smallPullback','bull','强趋势不断推进，回调浅而短，等待深回调的人被迫追随。','多数回调仅 1–3 根，或虽横向持续更久但始终很浅；很快再创新极值。','反向信号反复失败，回调无法有效测试均线或前一主要低点。','误以为强趋势必须由巨型 K 线组成，或因为没有深回调就在任意位置追价。'),
      p('micro-channel','Micro Channel','微型通道','trend','microChannel','bull','连续 K 线沿同一方向推进，几乎没有真正回调。','牛微通道中低点连续不下破；熊微通道中高点连续不突破。','首次反向突破后，原方向通常还有第二次测试。','把第一次破微通道当成主要趋势反转。'),
      p('stairs','Stairs','台阶推进','trend','stairs','trend','趋势以推进—回调—再推进的台阶结构创新极值。','每一腿都有新高或新低，中间回调保持趋势结构。','新台阶突破后守住前一层。','忽视台阶间距正在收缩。'),
      p('shrinking-stairs','Shrinking Stairs','收缩台阶','trend','shrinkingStairs','reversal','趋势仍创新极值，但每次推进幅度变小，动能逐渐衰减。','新高/低之间的距离缩短，回调相对更深。','趋势线破坏并出现回探失败，才升级为反转。','仅凭推进变短就立刻逆势。'),
      p('leg-two-legs','Leg / Two Legs','一腿与两腿运动','trend','twoLegs','neutral','市场常以两段运动完成回调、测试或目标推进。','明显摆动后暂停，再出现同方向第二段摆动。','第二腿在目标或结构边缘出现衰竭/恢复信号。','机械地把任意两次波动都数成两腿。'),
      p('climax','Climax','高潮','trend','climax','reversal','短期运动过快过远，提示需要重新发现公平价格，不等于立即反转。','连续大趋势 K 线、加速、远离均线、缺少回调。','先看横盘或两腿回调；更大反转需要结构破坏。','看到过度运动就第一时间摸顶抄底。'),
      p('overshoot','Overshoot','通道线超越','trend','overshoot','reversal','价格冲出趋势或通道边界，可能是加速，也可能是衰竭。','新极值明显越过既有通道线。','先看新价格是否被接受：继续同向跟进表示加速；缺乏跟进并被反向收回才支持衰竭。','只因碰到或越过通道线就做反向交易。'),

      // 区间与突破
      p('trading-range','Trading Range','交易区间','range','range','range','价格围绕公平区域反复测试，方向优势下降。','上下边缘多次被测试，K 线重叠，突破常失败。','边缘失败后指向中轴；真正突破需强度和接受。','在区间中部追随普通信号。'),
      p('tight-trading-range','Tight Trading Range','紧密交易区间','range','ttr','range','高度重叠、空间很小，停止单容易被来回触发。','多根 K 线实体和影线密集交叠。','等待市场离开拥挤区域并获得跟进。','在没有目标空间的位置频繁交易。'),
      p('barbwire','Barbwire','铁丝网','range','barbwire','range','三根以上高度重叠、带显著影线且至少含一根 doji 的紧密区间。','K 线可以相对较大，但彼此大量重叠、方向交替、影线突出，停止单交易很难盈利。','多数学习者等待清晰突破和跟进；熟练交易者有时在两端使用限价思维。','误以为 Barbwire 必须全是小 doji，或试图捕捉每一次很小的反转。'),
      p('broad-trading-range','Broad Trading Range','宽交易区间','range','broadRange','range','区间足够宽，边缘可以构造反向 scalp 或小 swing。','上下边缘清楚，中间有较大摆动空间。','边缘测试失败并出现指向区间内部的强度。','把顶部强上涨或底部强下跌当成必然突破。'),
      p('triangle','Triangle','收敛三角形','range','triangle','neutral','高点降低、低点抬高，是方向未定的突破模式。','摆动范围逐步收窄，多次反转。','等待强突破、跟进和回踩守住。','根据三角形朝向提前预测突破方向。'),
      p('expanding-triangle','Expanding Triangle','扩大型三角形','range','expandingTriangle','neutral','高点更高、低点更低，波动扩大但控制权不稳定。','摆动逐次超越前一高低点。','边缘失败后回归中部，或强突破后真正接受新区域。','追逐每一次边缘新极值。'),
      p('breakout-mode','Breakout Mode','突破模式','range','breakoutMode','neutral','任一方向突破都可能获得跟进的双向 setup，不等同于已经选定方向。','三角形、ii、ioi、TTR 或双向反转都可形成；压缩很常见，但不是定义本身。','让市场通过突破强度和跟进表态。','把“突破模式”误写成只有波动压缩，或提前建立固定方向偏见。'),
      p('breakout','Breakout','突破（强突破示例）','range','breakout','breakout','最低定义只是当前高点或低点越过重要价位；本图展示的是强且成功的突破。','越界即构成突破；收盘在边界外、相对大实体和较少反向影线只是在提高突破强度。','后续跟进、回踩守住和市场接受新价格，才说明突破成功。','把“突破”一词本身等同于有效突破或新趋势。'),
      p('failed-breakout','Failed Breakout','失败突破','range','failedBreakout','reversal','突破缺乏跟进并迅速回到原区域，追随者被困。','边界外停留短，反向 K 线将价格拉回区间。','反向突破信号并朝区间内部获得跟进。','在强突破仍有惯性时过早做失败突破。'),
      p('failed-failure','Failed Failure','失败的失败','range','failedFailure','breakout','突破失败后，反向失败本身又失败，于是原突破恢复；本质上失败突破变成了 breakout pullback。','突破回到旧区域后无法延续，数根内再次越过前一根高低点，形成原方向第二信号。','原方向重新触发并获得跟进，不要求第二次突破实体一定更大。','把恢复触发标在后续大 K 线上，或没有区分失败与失败的失败。'),
      p('breakout-pullback','Breakout Pullback','突破后回调','range','breakoutPullback','continuation','突破后的小回调，市场测试是否仍接受新价格。','价格回到突破点附近，但没有深度进入旧区域。','回踩守住并再次向突破方向触发。','把所有回踩都当成安全入场；深度收回可能是失败突破。'),
      p('breakout-test','Breakout Test','突破测试','range','breakoutTest','continuation','一种突破回调：价格接近最初入场价，测试盈亏平衡止损。','可以在入场后一两根内出现，也可以二十根以上之后才发生；允许轻微超越或未到达入场价。','测试后出现拒绝并再次向突破方向延续。','把所有回踩都叫 breakout test，或忽略测试前趋势已经衰减。'),
      p('ledge','Ledge','平台','range','ledge','breakout','小型交易区间的一侧由至少两根完全相同的极值构成。','Bull ledge 是相同低点形成平底；bear ledge 是相同高点形成平顶。','观察边界突破是否快速离开并获得跟进。','把“差不多相等”当成严格 ledge，或把停止单触发本身当成跟进。'),
      p('measured-move','Measured Move','量度运动','range','measuredMove','breakout','用前一腿或整理高度估算下一段可能测试的目标区域。','AB 段长度被投射到突破点之后。','目标与前高低、整数位或大周期位置重合时更有意义。','把量度目标当成必达价格或入场理由。'),
      p('vacuum-test','Vacuum Test','真空测试','range','vacuum','neutral','价格快速被明显目标吸引，看似强趋势，也可能只是订单集中。','接近前高低、区间边缘或整数位时突然加速。','到达目标后观察接受、停顿还是快速拒绝。','在目标前追价，或因目标到达就预设反转。'),

      // 延续形态
      p('bull-flag','Bull Flag','牛旗','continuation','bullFlag','bull','牛趋势中的次要向下或横向反转；可短至一根，也可回撤最近一腿的大部分。','关键不是必须浅，而是市场仍被判断为 Always In Long，下降更像回调而非新熊趋势。','向上触发后入场 K 线和跟进良好。','把经典斜旗外观当成唯一形式，或把区间中的普通反弹称作牛旗。'),
      p('bear-flag','Bear Flag','熊旗','continuation','bearFlag','bear','熊趋势中的次要向上或横向反转；可短至一根，也可回撤最近一腿的大部分。','关键不是必须浅，而是市场仍被判断为 Always In Short，上涨更像反弹而非新牛趋势。','向下触发并再次测试前低。','把经典斜旗外观当成唯一形式，或在宽通道底部盲目追随。'),
      p('h1','High 1','第一次向上恢复','continuation','h1','bull','牛旗或区间下部的第一次上破尝试。','本图按 stop 触发标准显示本根高点至少高一跳；官方概述材料也会用“达到或超过”的宽松候选表述。','强趋势中可直接成功；较弱背景更需要入场 K 线和跟进。','看到 H1 就机械买入，或把相等高点当成已经触发。'),
      p('h2','High 2','第二次向上恢复','continuation','h2','bull','第一次恢复失败后，牛方第二次尝试，常对应两腿回调。','H1 未延续，价格再回调后出现第二次上破。','空方第二次无法推进，多头触发后强收。','不区分趋势和区间；区间中的 H2 经常失败。'),
      p('l1','Low 1','第一次向下恢复','continuation','l1','bear','熊旗或区间上部的第一次下破尝试。','本图按 stop 触发标准显示本根低点至少低一跳；官方概述材料也会用“达到或跌破”的宽松候选表述。','强熊趋势中向下触发后获得跟进。','在区间底部机械卖出，或把相等低点当成已经触发。'),
      p('l2','Low 2','第二次向下恢复','continuation','l2','bear','第一次恢复失败后，空方第二次尝试，常对应两腿反弹。','L1 未延续，价格再反弹后出现第二次下破。','多方第二次无法推进，空头触发后强收。','把复杂区间中的任意第二次数成 L2。'),
      p('h2-bull-flag','High 2 Bull Flag','H2 牛旗','continuation','h2BullFlag','bull','牛趋势中的第二次向上恢复尝试，常对应两腿回调，也可能表现为小双底。','H1 未延续，出现较低高点后，再次上破前一根高点形成 H2。','趋势仍偏多、回调未破坏结构、入场后有跟进。','反推所有 H2 都必须长得像双底，或只数到二就买。'),
      p('l2-bear-flag','Low 2 Bear Flag','L2 熊旗','continuation','l2BearFlag','bear','熊趋势中的第二次向下恢复尝试，常对应两腿反弹，也可能表现为小双顶。','L1 未延续，出现较高低点后，再次下破前一根低点形成 L2。','趋势仍偏空、反弹未改变结构、下破后有跟进。','反推所有 L2 都必须长得像双顶，或在宽通道下沿机械追空。'),

        bars.forEach((bar, i) => {
          if (!bar || i === 0 || i === bars.length - 1) return;
          const prev = bars[i-1], next = bars[i+1];
          if (prev && next && ((bar.close > prev.close && bar.close > next.close) || (bar.close < prev.close && bar.close < next.close))) {
            guides += `<line class="guide" x1="${xAt(i)-step*.55}" y1="${y(bar.close)}" x2="${xAt(i)+step*.85}" y2="${y(bar.close)}"/>`;
          }
        });
      }
      if (options.curve) {
        guides += `<path class="guide guide-amber" d="M${firstX} ${y(clean[0]-2)} Q${xAt(Math.floor(closes.length*.63))} ${y(rawMax+9)} ${lastX} ${y(clean.at(-1)+3)}"/>`;
      }
      if (options.overshoot) {
        const peakPrice = Math.max(...validBars.map(bar => bar.high));
        const peakIndex = bars.findIndex(bar => bar?.high === peakPrice);
        guides += `<circle cx="${xAt(peakIndex)}" cy="${y(peakPrice+3)}" r="3.2" fill="var(--amber)"/><text class="chart-label" x="${xAt(peakIndex)-30}" y="${Math.max(13,y(peakPrice+7))}">OVERSHOOT</text>`;
      }
      if (options.maPrices) {
        const maPoints = options.maPrices.map((price, i) => `${xAt(i).toFixed(1)},${y(price).toFixed(1)}`).join(' ');
        guides += `<polyline points="${maPoints}" fill="none" stroke="var(--blue)" stroke-width="1.5" opacity=".9"/><text class="chart-muted" x="${xAt(Math.min(5, options.maPrices.length-1))}" y="${y(options.maPrices[Math.min(5, options.maPrices.length-1)])-5}">20 EMA</text>`;
      } else if (options.ma) {
        guides += `<path d="M${firstX} 132 C${xAt(2)} 128, ${xAt(4)} 112, ${lastX} 88" fill="none" stroke="var(--blue)" stroke-width="1.5" opacity=".8"/>`;
      }
      if (options.measure) {
        const a = options.measure.a ?? 0;
        const b = options.measure.b ?? Math.min(4, closes.length - 1);
        const c = options.measure.c ?? Math.min(b + 1, closes.length - 1);
        const d = options.measure.d ?? closes.length - 1;
        const aBar = bars[a], bBar = bars[b], cBar = bars[c], dBar = bars[d];
        if (aBar && bBar && cBar && dBar) {
          guides += `<path class="guide guide-amber" d="M${xAt(a)} ${y(aBar.close)} L${xAt(b)} ${y(bBar.close)} M${xAt(c)} ${y(cBar.close)} L${xAt(d)} ${y(dBar.close)}"/><text class="chart-label" x="${xAt(a+1)}" y="${Math.max(14,y(bBar.close+7))}">AB</text><text class="chart-label" x="${xAt(Math.max(c,d-1))}" y="${Math.max(14,y(dBar.close+7))}">= AB</text>`;
        }
      }
      if (options.gapMeasure && typeof options.gapMeasure === 'object') {
        const target = options.gapMeasure.target;
        const fromIndex = options.gapZone?.index ?? 0;
        guides += `<line class="guide guide-amber" x1="${xAt(fromIndex)}" y1="${y(target)}" x2="${lastX}" y2="${y(target)}"/><text class="chart-label" x="${lastX-56}" y="${Math.max(13,y(target)-5)}">MM TARGET</text>`;
      } else if (options.gapMeasure) {
        const gapIndex = closes.indexOf(null);
        const before = bars[gapIndex-1], after = bars[gapIndex+1], last = validBars.at(-1);
        if (before && after && last) {
          const gapMid = (before.high + after.low) / 2;
          guides += `<line class="guide guide-amber" x1="${firstX}" y1="${y(gapMid)}" x2="${lastX}" y2="${y(gapMid)}"/><text class="chart-label" x="${lastX-54}" y="${Math.max(13,y(last.close+6))}">TARGET</text>`;
        }
      }
      if (options.arrow) {
        const down = options.arrow === 'down';
        const sx = xAt(closes.length - 2), ex = lastX;
        const sy = y(clean.at(-2)), ey = down ? Math.min(139, sy + 34) : Math.max(15, sy - 34);
        guides += `<path class="guide guide-amber" d="M${sx} ${sy} L${ex} ${ey}"/><path d="M${ex} ${ey} l-9 ${down ? -3 : 3} l4 ${down ? -8 : 8} z" fill="var(--amber)"/>`;
      }
      if (options.openingBox) {
        const [from, to] = options.openingBox;
        const openingBars = bars.slice(from, to + 1).filter(Boolean);
        const top = Math.max(...openingBars.map(b => b.high));
        const bottom = Math.min(...openingBars.map(b => b.low));
        guides += `<rect class="zone" x="${xAt(from)-step*.55}" y="${y(top)}" width="${(to-from+1)*step}" height="${Math.max(4,y(bottom)-y(top))}"/><text class="chart-muted" x="${xAt(from)-step*.4}" y="${Math.max(13,y(top)-4)}">OPENING RANGE</text>`;
      }
      const genericBox = options.flagBox || options.consolidationBox;
      if (genericBox) {
        const [from, to] = genericBox;
        const boxBars = bars.slice(from, to + 1).filter(Boolean);
        const top = Math.max(...boxBars.map(b => b.high));
        const bottom = Math.min(...boxBars.map(b => b.low));
        const label = options.flagBox ? 'FINAL FLAG' : 'CONSOLIDATION';
        guides += `<rect class="zone" x="${xAt(from)-step*.55}" y="${y(top)}" width="${(to-from+1)*step}" height="${Math.max(4,y(bottom)-y(top))}"/><text class="chart-muted" x="${xAt(from)-step*.4}" y="${Math.max(13,y(top)-4)}">${label}</text>`;
      }
      if (options.trendLine) {
        const line = options.trendLine;
        const slope = (line.throughPrice - line.fromPrice) / Math.max(1, line.throughBar - line.fromBar);
        const endPrice = line.fromPrice + slope * (line.extendTo - line.fromBar);
        guides += `<line class="guide" x1="${xAt(line.fromBar)}" y1="${y(line.fromPrice)}" x2="${xAt(line.extendTo)}" y2="${y(endPrice)}"/><text class="chart-muted" x="${xAt(line.extendTo)-26}" y="${Math.min(141,y(endPrice)+14)}">TREND-LINE BREAK</text>`;
      }
      if (options.priorLevel !== undefined) {
        guides += `<line class="guide guide-blue" x1="${xAt(Math.floor(closes.length*.38))}" y1="${y(options.priorLevel)}" x2="${lastX}" y2="${y(options.priorLevel)}"/>`;
      }
      if (Number.isInteger(options.reversalAt)) {
        const rx = xAt(options.reversalAt), ry = y(closes[options.reversalAt]);
        guides += `<path class="guide guide-amber" d="M${rx} ${Math.max(15,ry-28)} L${rx} ${ry-6}"/><path d="M${rx} ${ry-6} l-5 -8 h10 z" fill="var(--amber)"/>`;
      }
      if (options.gapZone) {
        const topPrice = Math.max(options.gapZone.from, options.gapZone.to);
        const bottomPrice = Math.min(options.gapZone.from, options.gapZone.to);
        const zoneX = xAt(options.gapZone.index) - bodyW * .6;
        const zoneEnd = Number.isInteger(options.gapZone.until) ? xAt(options.gapZone.until) : lastX;
        const topY = y(topPrice);
        const bottomY = y(bottomPrice);
        guides += `<rect class="zone" x="${zoneX}" y="${topY}" width="${zoneEnd-zoneX}" height="${Math.max(3,bottomY-topY)}"/><text class="chart-label" x="${zoneX+4}" y="${Math.max(13,topY-4)}">${escapeHtml(options.gapZone.label)}</text>`;
      }
      if (options.gapType) {
        const gapIndex = closes.indexOf(null);
        if (gapIndex >= 0) {
          const before = bars[gapIndex - 1], after = bars[gapIndex + 1];
          const gapHigh = after.close > before.close ? after.low : before.low;
          const gapLow = after.close > before.close ? before.high : after.high;
          const topY = y(Math.max(gapHigh, gapLow));
          const bottomY = y(Math.min(gapHigh, gapLow));
          const gx = xAt(gapIndex - 1) + bodyW * .55;
          const gapLabel = options.gapType === 'failed' ? 'OPENING GAP · FILLED' : 'OPENING GAP';
          guides += `<rect class="zone" x="${gx}" y="${topY}" width="${lastX-gx}" height="${Math.max(3,bottomY-topY)}"/><text class="chart-label" x="${gx+4}" y="${Math.max(13,topY-4)}">${gapLabel}</text>`;
        } else if ((options.gapType === 'body' || options.gapType === 'micro') && options.gapPair) {
          const [fromIndex, toIndex] = options.gapPair;
          const fromBar = bars[fromIndex], toBar = bars[toIndex];
          const lowerPrice = options.gapType === 'body'
            ? Math.max(fromBar.open, fromBar.close)
            : fromBar.high;
          const upperPrice = options.gapType === 'body'
            ? Math.min(toBar.open, toBar.close)
            : toBar.low;
          const topY = y(Math.max(lowerPrice, upperPrice));
          const bottomY = y(Math.min(lowerPrice, upperPrice));
          const zoneX = xAt(fromIndex) + bodyW * .6;
          const zoneEnd = xAt(toIndex) - bodyW * .6;
          const gapLabel = options.gapType === 'body' ? 'BODY GAP' : 'MICRO MEASURING GAP';
          guides += `<rect class="zone" x="${zoneX}" y="${topY}" width="${zoneEnd-zoneX}" height="${Math.max(3,bottomY-topY)}"/><text class="chart-label" x="${zoneX+4}" y="${Math.max(13,topY-4)}">${gapLabel}</text>`;
        }
      }
      if (options.day) {
        const openLabelX = Math.max(4, firstX);
        guides += `<line x1="${firstX}" y1="16" x2="${firstX}" y2="145" stroke="var(--amber)" stroke-width="1" opacity=".7"/><text class="${options.strongOpen ? 'chart-label' : 'chart-muted'}" x="${openLabelX}" y="13">${options.strongOpen ? 'STRONG OPEN' : 'OPEN'}</text>`;
      }
      if (options.openingPrice !== undefined) {
        guides += `<line class="guide guide-amber" x1="${firstX}" y1="${y(options.openingPrice)}" x2="${lastX}" y2="${y(options.openingPrice)}"/><text class="chart-label" x="${firstX+4}" y="${Math.max(13,y(options.openingPrice)-5)}">OPEN PRICE</text>`;
      }
      if (options.markers) options.markers.forEach(m => {
        const bar = bars[m.i]; if (!bar) return;
        const x = xAt(m.i) + (m.dx || 0);
        const below = m.side === 'below' || m.anchor === 'low';
        const markerY = below ? Math.min(141, y(bar.low - 5.5)) : Math.max(13, y(bar.high + 5.5));
        guides += `<circle cx="${x}" cy="${markerY}" r="9" fill="var(--surface)" stroke="var(--amber)" stroke-width="1.1"/><text class="chart-label" x="${x}" y="${markerY+3.2}" text-anchor="middle">${m.t}</text>`;
      });

      return `<svg viewBox="0 0 364 154" role="img" aria-label="${escapeHtml(pattern.zh)}示意图">${grid}${pricePaths}${guides}${candles}</svg>`;
    }

    function contextClass(value) {
      if (value === 'bull' || value === 'continuation' || value === 'trend') return 'bull';
      if (value === 'bear' || value === 'reversal') return 'bear';
      if (value === 'breakout') return 'breakout';
      return '';
    }

    function filteredPatterns() {
      const q = state.query.trim().toLowerCase();
      return patterns.filter(item => {
        const categoryMatch = state.category === 'all' || item.category === state.category;
        const haystack = `${item.en} ${item.zh} ${item.summary} ${item.identify} ${item.confirm}`.toLowerCase();
        return categoryMatch && (!q || haystack.includes(q));
      });
    }

    function renderFilters() {
      const root = document.getElementById('filters');
      root.innerHTML = categories.map(cat => `<button class="filter-button ${state.category === cat.id ? 'active' : ''}" type="button" data-category="${cat.id}">${cat.label}</button>`).join('');
      root.querySelectorAll('button').forEach(button => button.addEventListener('click', () => {
        state.category = button.dataset.category;
        state.open = null;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }));
    }

    function renderSidebar(items) {
      const root = document.getElementById('sidebarNav');
      root.innerHTML = items.map((item, index) => `<button class="sidebar-link ${state.open === item.id ? 'active' : ''}" type="button" data-id="${item.id}"><span class="sidebar-number">${String(index+1).padStart(2,'0')}</span><strong>${escapeHtml(item.en)}</strong><span>${C[item.context] || '形态'}</span></button>`).join('');
      root.querySelectorAll('button').forEach(button => button.addEventListener('click', () => {
        const card = document.getElementById(`pattern-${button.dataset.id}`);
        if (!card) return;
        state.open = button.dataset.id;
        updateExpanded();
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }));
    }

    function renderCards(items) {
      const root = document.getElementById('atlasList');
      root.innerHTML = items.map((item, index) => {
        const expanded = state.open === item.id;
        return `<article class="pattern-card ${expanded ? 'expanded' : ''}" id="pattern-${item.id}" data-id="${item.id}">
          <button class="card-trigger" type="button" aria-expanded="${expanded}" aria-controls="detail-${item.id}">
            <span class="card-number">${String(index+1).padStart(2,'0')}</span>
            <span class="chart-shell">${renderChart(item)}</span>
            <span class="card-copy">
              <span class="title-row"><span><h2 class="pattern-name">${escapeHtml(item.en)}</h2><p class="pattern-zh">${escapeHtml(item.zh)}</p></span><span class="context-tag ${contextClass(item.context)}">${C[item.context] || '形态'}</span></span>
              <p class="pattern-summary">${escapeHtml(item.summary)}</p>
            </span>
            <span class="chevron" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m7 9 5 5 5-5"/></svg></span>
          </button>
          <div class="card-detail" id="detail-${item.id}" aria-hidden="${!expanded}" ${expanded ? '' : 'inert'}><div class="detail-inner"><div class="detail-grid">
            <div class="detail-cell"><p class="detail-label">识别</p><p>${escapeHtml(item.identify)}</p></div>
            <div class="detail-cell"><p class="detail-label">确认</p><p>${escapeHtml(item.confirm)}</p></div>
            <div class="detail-cell"><p class="detail-label">常见误读</p><p>${escapeHtml(item.trap)}</p></div>
            <div class="detail-cell"><p class="detail-label">读图顺序</p><p>先判断市场循环与位置，再检查触发、跟进、被困者、现实目标和失效点。</p></div>
          </div></div></div>
        </article>`;
      }).join('');
      root.querySelectorAll('.card-trigger').forEach(button => button.addEventListener('click', () => {
        const id = button.closest('.pattern-card').dataset.id;
        state.open = state.open === id ? null : id;
        updateExpanded();
      }));
    }

    function updateExpanded() {
      document.querySelectorAll('.pattern-card').forEach(card => {
        const open = card.dataset.id === state.open;
        card.classList.toggle('expanded', open);
        card.querySelector('.card-trigger').setAttribute('aria-expanded', String(open));
        const detail = card.querySelector('.card-detail');
        detail.setAttribute('aria-hidden', String(!open));
        detail.toggleAttribute('inert', !open);
      });
      document.querySelectorAll('.sidebar-link').forEach(link => link.classList.toggle('active', link.dataset.id === state.open));
      try {
        const nextUrl = state.open ? `#${state.open}` : location.href.replace(/#.*$/, '');
        history.replaceState(null, '', nextUrl);
      } catch {
        // Some browsers restrict History API calls on directly opened file:// pages.
        if (state.open) location.hash = state.open;
      }
    }

    function render() {
      const items = filteredPatterns();
      renderFilters();
      renderSidebar(items);
      renderCards(items);
      document.getElementById('resultCount').textContent = `${items.length} / ${patterns.length} 个形态`;
      document.getElementById('atlasList').style.display = items.length ? 'grid' : 'none';
      document.getElementById('emptyState').style.display = items.length ? 'none' : 'grid';
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>'"]/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[char]));
    }

    const search = document.getElementById('search');
    const clearSearch = document.getElementById('clearSearch');
    search.addEventListener('input', () => {
      state.query = search.value;
      state.open = null;
      clearSearch.style.display = search.value ? 'grid' : 'none';
      render();
    });
    clearSearch.addEventListener('click', () => {
      search.value = ''; state.query = ''; state.open = null; clearSearch.style.display = 'none'; render(); search.focus();
    });

    const themeToggle = document.getElementById('themeToggle');
    const icons = {
      sun: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3.5"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
      moon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M20 15.4A8.5 8.5 0 0 1 8.6 4a8.5 8.5 0 1 0 11.4 11.4Z"/></svg>'
    };
    function syncThemeIcon() { themeToggle.innerHTML = document.documentElement.dataset.theme === 'dark' ? icons.sun : icons.moon; }
    const savedTheme = localStorage.getItem('brooks-theme');
    if (savedTheme) document.documentElement.dataset.theme = savedTheme;
    syncThemeIcon();
    themeToggle.addEventListener('click', () => {
      const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next; localStorage.setItem('brooks-theme', next); syncThemeIcon();
    });

    const backTop = document.getElementById('backTop');
    window.addEventListener('scroll', () => backTop.classList.toggle('visible', window.scrollY > 700), { passive: true });
    backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    document.addEventListener('keydown', event => {
      if (event.key === '/' && document.activeElement !== search) { event.preventDefault(); search.focus(); }
      if (event.key === 'Escape') { state.open = null; updateExpanded(); search.blur(); }
    });

    const initialHash = location.hash.slice(1);
    if (patterns.some(item => item.id === initialHash)) state.open = initialHash;
    render();
    if (state.open) requestAnimationFrame(() => document.getElementById(`pattern-${state.open}`)?.scrollIntoView({ block: 'center' }));
  </script>
</body>
</html>
